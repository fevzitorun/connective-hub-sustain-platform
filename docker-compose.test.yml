version: '3.9'

# SustainHub — İzole Test Ortamı
# ANTIGRAVITY-PROMPT.md satır 253: docker-compose.test.yml (izole test ortamı)
# Kullanım: docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit

services:

  test-db:
    image: postgres:16-alpine
    container_name: sustain_test_db
    environment:
      POSTGRES_USER: sustain_test
      POSTGRES_PASSWORD: test_password_2026
      POSTGRES_DB: sustaindb_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # RAM'de çalışır — hızlı, geçici
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sustain_test -d sustaindb_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-redis:
    image: redis:7-alpine
    container_name: sustain_test_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-runner:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
    container_name: sustain_test_runner
    environment:
      DATABASE_URL: postgresql+asyncpg://sustain_test:test_password_2026@test-db:5432/sustaindb_test
      REDIS_URL: redis://test-redis:6379
      SECRET_KEY: test-secret-key-for-testing-only-32chars
      ANTHROPIC_API_KEY: test-key
      ENVIRONMENT: test
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    volumes:
      - ./platform/backend:/app
    command: >
      sh -c "python -c 'from app.database import Base, engine; import asyncio; asyncio.run(Base.metadata.create_all(engine))' 2>/dev/null;
             pytest tests/ -v --tb=short --cov=app --cov-report=term-missing --cov-report=html:htmlcov"
