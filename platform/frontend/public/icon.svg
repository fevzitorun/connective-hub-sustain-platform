<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="SustainHub">
  <!-- Outer magnifier ring -->
  <circle cx="43" cy="43" r="36" fill="none" stroke="#059669" stroke-width="6"/>

  <!-- Leaf body — dark forest base (left/lower half) -->
  <path d="M22,69 C19,57 24,43 33,34 C42,25 56,21 63,24 C70,27 70,35 65,43
           C57,54 42,62 32,68 C28,71 24,71 22,69 Z" fill="#065f46"/>

  <!-- Leaf highlight — bright upper zone -->
  <path d="M33,34 C42,25 56,21 63,24 C70,27 70,35 65,43 C60,50 50,55 42,59 Z"
        fill="#059669"/>

  <!-- Central vein -->
  <path d="M23,68 C31,54 41,41 62,25" stroke="#6ee7b7" stroke-width="2.1"
        fill="none" stroke-linecap="round"/>

  <!-- Side veins — like KamuMetre's diagonal rays but organic -->
  <line x1="29" y1="60" x2="39" y2="52" stroke="#a7f3d0" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="34" y1="53" x2="45" y2="45" stroke="#a7f3d0" stroke-width="1.7" stroke-linecap="round"/>
  <line x1="40" y1="47" x2="50" y2="40" stroke="#a7f3d0" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="46" y1="41" x2="55" y2="34" stroke="#6ee7b7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="36" x2="60" y2="29" stroke="#6ee7b7" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Magnifier handle -->
  <line x1="70" y1="70" x2="90" y2="90" stroke="#059669" stroke-width="10"
        stroke-linecap="round"/>
</svg>
